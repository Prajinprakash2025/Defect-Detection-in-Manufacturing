{% extends 'base_auth.html' %}
{% load crispy_forms_tags %}

{% block title %}Login - Defect Detection{% endblock %}

{% block content %}
<div class="row justify-content-center align-items-center" style="min-height: 80vh;">
    <div class="col-md-4">
        <div class="card shadow-lg border-0 rounded-lg">
            <div class="card-header bg-primary text-white text-center py-4">
                <i class="fas fa-microscope fa-3x mb-2"></i>
                <h3 class="font-weight-light my-2">Defect Detection</h3>
                <small>Sign in to continue</small>
            </div>
            <div class="card-body p-5">
                <form method="post">
                    {% csrf_token %}
                    {{ form|crispy }}

                    <div class="d-grid gap-2 mt-4">
                        <button type="submit" class="btn btn-primary btn-lg shadow-sm">
                            Login <i class="fas fa-sign-in-alt ms-2"></i>
                        </button>
                    </div>
                </form>
            </div>
            <div class="card-footer text-center py-3 bg-light">
                <div class="small">
                    <a href="{% url 'signup' %}" class="text-decoration-none">Need an account? Sign up!</a>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
