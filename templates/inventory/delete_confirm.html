{% extends 'base.html' %}

{% block title %}Delete {{ type|title }} | DetectAI{% endblock %}

{% block content %}
<div class="container-fluid px-0">
    <div class="row justify-content-center mt-4 mt-md-5">
        <div class="col-12 col-md-8 col-lg-6 col-xl-5">
            
            <div class="card shadow-sm border-0 rounded-4 overflow-hidden">
                
                <div class="card-body p-4 p-md-5 text-center">
                    
                    <div class="d-inline-flex justify-content-center align-items-center rounded-circle bg-danger bg-opacity-10 text-danger mb-4" style="width: 80px; height: 80px;">
                        <i class="fas fa-triangle-exclamation fa-3x"></i>
                    </div>
                    
                    <h3 class="fw-bold text-dark mb-2">Delete {{ type|title }}</h3>
                    <p class="text-muted mb-1" style="font-size: 1.05rem;">
                        Are you sure you want to permanently delete:
                    </p>
                    
                    <div class="p-3 bg-light rounded-3 my-3 border border-secondary border-opacity-10 d-inline-block w-100">
                        <strong class="text-dark fs-5">{{ object }}</strong>
                    </div>
                    
                    <p class="text-danger small fw-bold mb-4">
                        <i class="fas fa-circle-info me-1"></i> This action is permanent and cannot be undone.
                    </p>
                    
                    <form method="post" class="d-flex justify-content-center gap-3 w-100">
                        {% csrf_token %}
                        
                        <a href="javascript:history.back()" class="btn btn-light border text-muted px-4 fw-semibold flex-fill" style="border-radius: 10px; max-width: 200px;">
                            Cancel
                        </a>
                        
                        <button class="btn btn-danger px-4 fw-bold flex-fill d-flex justify-content-center align-items-center gap-2" type="submit" style="border-radius: 10px; max-width: 200px;" onclick="this.innerHTML='<i class=\'fas fa-spinner fa-spin\'></i> Deleting...';">
                            <i class="fas fa-trash-alt"></i> Yes, Delete
                        </button>
                    </form>
                    
                </div>
            </div>
            
        </div>
    </div>
</div>
{% endblock %}
