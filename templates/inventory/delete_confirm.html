{% extends 'base.html' %}
{% block title %}Delete Confirmation{% endblock %}
{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6">
        <div class="card shadow-sm mt-4 border-danger">
            <div class="card-header bg-danger text-white">
                <h4 class="mb-0">Delete {{ type }}</h4>
            </div>
            <div class="card-body text-center">
                <p class="fs-5">Are you sure you want to delete <strong>{{ object }}</strong>?</p>
                <form method="post">
                    {% csrf_token %}
                    <button class="btn btn-danger" type="submit">Confirm Delete</button>
                    <a href="javascript:history.back()" class="btn btn-secondary ms-2">Cancel</a>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
