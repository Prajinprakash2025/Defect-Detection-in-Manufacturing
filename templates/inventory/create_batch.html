{% extends 'base.html' %}
{% load crispy_forms_tags %}

{% block title %}{{ title }} | DetectAI{% endblock %}

{% block content %}
<div class="container-fluid px-0">
    <div class="row justify-content-center mt-3 mt-md-4">
        <div class="col-12 col-md-10 col-lg-8 col-xl-6">
            
            <div class="card shadow border-0 rounded-4 overflow-hidden">
                
                <div class="card-header bg-transparent border-bottom border-secondary border-opacity-10 p-4">
                    <div class="d-flex align-items-center gap-3">
                        <div class="bg-primary bg-opacity-10 text-primary rounded-circle d-flex justify-content-center align-items-center flex-shrink-0" style="width: 48px; height: 48px;">
                            <i class="fas fa-box-open fs-5"></i>
                        </div>
                        <div>
                            <h4 class="fw-bold text-dark mb-0">{{ title }}</h4>
                            <p class="text-muted small mb-0 mt-1">Fill out the details below to configure the production batch.</p>
                        </div>
                    </div>
                </div>
                
                <div class="card-body p-4 p-md-5">
                    
                    <form method="post" action="">
                        {% csrf_token %}
                        
                        <div class="mb-4">
                            {{ form|crispy }}
                        </div>
                        
                        <div class="d-flex justify-content-end gap-3 pt-4 border-top border-secondary border-opacity-10">
                            <a href="{% url 'batch_list' %}" class="btn btn-light border text-muted px-4 fw-semibold" style="border-radius: 8px;">
                                Cancel
                            </a>
                            <button type="submit" class="btn btn-primary px-4 fw-bold d-flex align-items-center gap-2" style="border-radius: 8px;" onclick="this.innerHTML='<i class=\'fas fa-spinner fa-spin\'></i> Saving...';">
                                <i class="fas fa-save"></i> Save Batch
                            </button>
                        </div>
                        
                    </form>
                    
                </div>
                
            </div>
            
        </div>
    </div>
</div>
{% endblock %}
