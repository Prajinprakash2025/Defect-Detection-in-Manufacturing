{% load static %}
<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}DetectAI | Authentication{% endblock %}</title>
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    
    <link rel="stylesheet" href="{% static 'css/style.css' %}?v=20260308">

    <style>
        html {
            overflow: auto !important;
            height: auto !important;
        }

        /* Auth layout */
        .auth-body {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            background:
                radial-gradient(130% 140% at 15% 20%, rgba(14, 165, 233, 0.16), transparent 42%),
                radial-gradient(120% 120% at 85% 10%, rgba(16, 185, 129, 0.14), transparent 40%),
                radial-gradient(90% 90% at 50% 85%, rgba(245, 158, 11, 0.10), transparent 45%),
                var(--bg-body);
            position: relative;
            padding: 32px 18px;
            overflow-x: hidden;
            overflow-y: auto;
        }

        /* Ambient Premium Background Blurs */
        .ambient-blob {
            position: absolute;
            border-radius: 50%;
            filter: blur(100px);
            z-index: 0;
            opacity: 0.6;
            pointer-events: none;
        }
        .blob-1 {
            top: -10%; left: -5%;
            width: 400px; height: 400px;
            background: rgba(14, 165, 233, 0.30); /* Cyan */
        }
        .blob-2 {
            bottom: -15%; right: -5%;
            width: 500px; height: 500px;
            background: rgba(16, 185, 129, 0.20); /* Emerald */
        }
        [data-bs-theme="dark"] .blob-1 { background: rgba(14, 165, 233, 0.16); }
        [data-bs-theme="dark"] .blob-2 { background: rgba(16, 185, 129, 0.12); }

        /* The container that holds the Login/Register forms */
        .auth-container {
            width: min(1100px, 100%);
            padding: 1rem;
            z-index: 10;
        }

        /* Protects the flash messages from breaking the layout */
        .auth-messages {
            width: 100%;
            margin-bottom: 1.5rem;
        }
    </style>
</head>

<body class="auth-body">
    <div class="ambient-blob blob-1"></div>
    <div class="ambient-blob blob-2"></div>

    <div class="auth-container">
        
        {% if messages %}
        <div class="auth-messages">
            {% for message in messages %}
            <div class="alert alert-{{ message.tags }} alert-dismissible fade show shadow-sm border-0" role="alert">
                <i class="fas fa-info-circle me-2"></i> {{ message }}
                <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
            </div>
            {% endfor %}
        </div>
        {% endif %}

        <div style="position: relative; z-index: 10;">
            {% block content %}
            {% endblock %}
        </div>

    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>

</html>
